# 知鸟工具箱 - Docker Compose 编排
# 详见 09-deployment.md
# 启动: docker compose up -d
# 健康检查: curl http://localhost/api/health

services:
  # ===== Nginx 反代 =====
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - api
    networks:
      - zhiniao-net

  # ===== API 服务 =====
  api:
    build: ./backend
    restart: always
    expose:
      - "8000"
    # 开发模式:暴露 8000 到宿主机,方便直接访问 /docs
    # 生产环境:设 EXPOSE_API_PORT=false 或删掉此映射
    ports:
      - "${EXPOSE_API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    env_file:
      - ./backend/.env
    volumes:
      # 挂载 schemas 供 API 读取
      - ./schemas:/app/schemas:ro
      # 挂载 .env 供后台「支付接入」页读写(宿主真实文件,重启生效)
      - ./.env:/app/.env:rw
      # 挂载微信支付商户私钥/证书(.gitignore 拒 *.pem 不入 git;只读)
      # V3 下单签名读 apiclient_key.pem(WECHAT_PRIVATE_KEY_PATH=/app/secrets/apiclient_key.pem)
      - ./backend/secrets:/app/secrets:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - zhiniao-net

  # ===== PostgreSQL =====
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zhiniao}
      POSTGRES_USER: ${POSTGRES_USER:-zhiniao}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zhiniao_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zhiniao}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zhiniao-net

  # ===== Redis =====
  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-change-me-redis-password}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - zhiniao-net

  # ===== MinIO =====
  minio:
    image: minio/minio
    restart: always
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - zhiniao-net

  # ===== MinIO 初始化(创建 buckets) =====
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      mc mb local/zhiniao-input --ignore-existing;
      mc mb local/zhiniao-output --ignore-existing;
      mc mb local/zhiniao-screenshots --ignore-existing;
      echo 'Buckets created';
      "
    networks:
      - zhiniao-net

  # ===== Stirling Worker (PDF 工具处理) =====
  stirling:
    image: tool-site-project-stirling:custom   # 自建镜像:官方 latest + tesseract chi_sim/eng(修复 pdf-ocr 500)
    restart: always
    environment:
      - DOCKER_ENABLE_SECURITY=false
      - SECURITY_CUSTOMGLOBALAPIKEY=${STIRLING_API_KEY:-zhiniao_stirling_key_2026}
      - LANGS=zh_CN
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-change-me-redis-password}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - stirling-data:/configs
      - stirling-logs:/logs
    # healthcheck 用镜像自带的(/api/v1/info/status → status:UP,已验证 healthy),不覆盖
    depends_on:
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - zhiniao-net

  # ===== Stirling Worker (queue:stirling 队列消费者,接通 12 个 PDF 工具) =====
  # 修复 38 号 §2.2 硬伤:registry 挂 12 个 backend=stirling 工具但无消费者,任务永远卡 queued
  stirling-worker:
    build:
      context: ./workers
      dockerfile: stirling/Dockerfile
    restart: always
    env_file:
      - ./backend/.env            # 复用 api 的 env(REDIS_*/MINIO_*/POSTGRES_* 服务名)
    environment:
      - STIRLING_URL=http://stirling:8080
      - STIRLING_API_KEY=${STIRLING_API_KEY:-zhiniao_stirling_key_2026}
      - WORKER_ID=stirling-1
    depends_on:
      redis:
        condition: service_started
      minio:
        condition: service_healthy
      stirling:
        condition: service_healthy
    networks:
      - zhiniao-net

  # ===== Image Worker (queue:image 队列消费者,图片格式转换付费档) =====
  # Pillow + pillow-heif 纯 Python HEIF 解码,免系统 libheif;接通 heic-to-jpg 等
  image-worker:
    build:
      context: ./workers
      dockerfile: image/Dockerfile
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - WORKER_ID=image-1
    depends_on:
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - zhiniao-net

  # ===== FFmpeg Worker (queue:ffmpeg 队列消费者,音频格式转换) =====
  # apt ffmpeg(MP3/WAV/FLAC/OGG 免专利,不做 AAC);接通 audio-convert 真版
  ffmpeg-worker:
    build:
      context: ./workers
      dockerfile: ffmpeg/Dockerfile
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - WORKER_ID=ffmpeg-1
    depends_on:
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - zhiniao-net

  # ===== Prometheus 监控 =====
  prometheus:
    image: prom/prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    networks:
      - zhiniao-net

  # ===== Grafana =====
  grafana:
    image: grafana/grafana
    restart: always
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-loki-datasource
    networks:
      - zhiniao-net

  # ===== Loki 日志聚合 =====
  loki:
    image: grafana/loki:latest
    restart: always
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
    networks:
      - zhiniao-net

  # ===== Promtail 日志采集 =====
  promtail:
    image: grafana/promtail:latest
    restart: always
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - nginx-logs:/var/log/nginx:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - zhiniao-net

volumes:
  postgres-data:
  redis-data:
  minio-data:
  prometheus-data:
  grafana-data:
  stirling-data:
  stirling-logs:
  nginx-logs:
  loki-data:

networks:
  zhiniao-net:
    driver: bridge
