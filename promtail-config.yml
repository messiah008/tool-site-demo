# Promtail 配置 - 采集 Nginx 和容器日志,发送到 Loki
# 详见 09-deployment.md

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Nginx 访问日志(JSON 格式)
  - job_name: nginx
    static_configs:
      - targets: [localhost]
        labels:
          job: nginx
          host: nginx
          __path__: /var/log/nginx/*.log
    pipeline_stages:
      - json:
          expressions:
            time: time
            method: request_method
            uri: request_uri
            status: status
            duration: request_time
      - labels:
          method:
          status:

  # Docker 容器日志
  - job_name: containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        filters:
          - name: label
            values: [com.docker.compose.project=zhiniao-tool-site-project]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        target_label: container
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
